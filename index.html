<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>おもいでマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a2e;
      --paper: #faf7f2;
      --warm: #e8ddd0;
      --accent: #c9614a;
      --accent2: #4a8fa8;
      --green: #5a8a6a;
      --shadow: rgba(26,26,46,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      height: 100dvh;
      width: 100%;
      font-family: 'Zen Maru Gothic', sans-serif;
      background: var(--ink);
      overflow: hidden;
      position: fixed;
    }

    /* ─── MAP ─── */
    #map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    /* ─── TOP BAR ─── */
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: env(safe-area-inset-top, 12px) 16px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      pointer-events: none;
    }

    .app-title {
      background: var(--paper);
      border-radius: 0 0 20px 20px;
      padding: 8px 18px 10px;
      box-shadow: 0 4px 20px var(--shadow);
      pointer-events: auto;
    }

    .app-title h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: var(--ink);
      letter-spacing: 0.02em;
    }

    .app-title p {
      font-size: 10px;
      color: #888;
      margin-top: 1px;
    }

    /* ─── LOGIN CARD ─── */
    .login-card {
      background: var(--paper);
      border-radius: 0 0 0 20px;
      padding: 8px 14px 10px;
      box-shadow: 0 4px 20px var(--shadow);
      text-align: right;
      pointer-events: auto;
      min-width: 100px;
    }

    .login-status {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      margin-bottom: 5px;
    }

    .login-status.logged-in { color: var(--green); }

    .btn-google {
      background: var(--accent);
      color: white;
      border: none;
      padding: 7px 14px;
      border-radius: 20px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(201,97,74,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-google:active { transform: scale(0.96); }
    .btn-google:disabled { background: #ccc; box-shadow: none; cursor: default; }

    .btn-logout {
      background: none;
      border: 1px solid #ccc;
      color: #888;
      padding: 5px 10px;
      border-radius: 20px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 11px;
      cursor: pointer;
    }

    /* ─── BOTTOM NAV ─── */
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0 16px env(safe-area-inset-bottom, 16px);
      pointer-events: none;
    }

    .nav-inner {
      background: var(--paper);
      border-radius: 24px 24px 0 0;
      padding: 12px 8px 4px;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 -4px 30px var(--shadow);
      pointer-events: auto;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      padding: 8px 4px;
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Zen Maru Gothic', sans-serif;
    }

    .nav-btn .icon {
      font-size: 22px;
      line-height: 1;
    }

    .nav-btn .label {
      font-size: 10px;
      color: #aaa;
      font-weight: 700;
      transition: color 0.2s;
    }

    .nav-btn.active {
      background: var(--warm);
    }

    .nav-btn.active .label { color: var(--ink); }

    /* ─── MODE HINT ─── */
    .mode-hint {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99;
      background: var(--ink);
      color: var(--paper);
      font-size: 12px;
      padding: 8px 20px;
      border-radius: 20px;
      white-space: nowrap;
      box-shadow: 0 4px 16px var(--shadow);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .mode-hint.visible { opacity: 1; }

    /* ─── BOTTOM SHEET ─── */
    .sheet-overlay {
      position: absolute;
      inset: 0;
      background: rgba(26,26,46,0.5);
      z-index: 200;
      display: none;
      backdrop-filter: blur(2px);
    }

    .sheet-overlay.open { display: block; }

    .sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--paper);
      border-radius: 28px 28px 0 0;
      padding: 0 20px calc(env(safe-area-inset-bottom, 20px) + 20px);
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 90dvh;
      overflow-y: auto;
    }

    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 40px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 12px auto 20px;
    }

    .sheet-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #888;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: white;
      border: 1.5px solid var(--warm);
      border-radius: 16px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 16px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--accent2); }

    textarea.form-input {
      resize: none;
      height: 100px;
      line-height: 1.6;
    }

    .photo-picker {
      width: 100%;
      height: 110px;
      background: white;
      border: 2px dashed var(--warm);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .photo-picker:active { background: var(--warm); }
    .photo-picker.has-photo { border-style: solid; border-color: var(--green); background: #f0f7f2; }

    .photo-picker .picker-icon { font-size: 28px; }
    .photo-picker .picker-text { font-size: 12px; color: #aaa; font-weight: 700; }
    .photo-picker.has-photo .picker-text { color: var(--green); }

    .photo-preview {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 16px;
      display: none;
    }

    .btn-save {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 20px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 4px 16px rgba(201,97,74,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-save:active { transform: scale(0.98); }

    .btn-cancel {
      width: 100%;
      padding: 14px;
      background: none;
      color: #aaa;
      border: none;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 15px;
      cursor: pointer;
      margin-top: 4px;
    }

    /* ─── POPUP ─── */
    .leaflet-popup-content-wrapper {
      border-radius: 20px !important;
      box-shadow: 0 8px 32px var(--shadow) !important;
      padding: 0 !important;
      overflow: hidden;
      background: var(--paper) !important;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      width: auto !important;
    }

    .leaflet-popup-tip { background: var(--paper) !important; }

    .popup-wrap {
      min-width: 200px;
      max-width: 260px;
    }

    .popup-img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }

    .popup-body {
      padding: 14px 16px;
    }

    .popup-date {
      font-size: 11px;
      color: #aaa;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .popup-comment {
      font-size: 14px;
      color: var(--ink);
      line-height: 1.6;
    }

    .popup-delete {
      display: block;
      width: calc(100% - 32px);
      margin: 0 16px 14px;
      padding: 10px;
      background: #fff0ee;
      color: var(--accent);
      border: 1.5px solid #ffd5cc;
      border-radius: 12px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }

    /* ─── LOADING ─── */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(250,247,242,0.85);
      z-index: 999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      backdrop-filter: blur(4px);
    }

    .loading-overlay.visible { display: flex; }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--warm);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
    }

    /* ─── LEAFLET OVERRIDES ─── */
    .leaflet-control-zoom {
      display: none !important;
    }

    .leaflet-marker-icon {
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.25));
    }
  </style>
</head>
<body>

<!-- MAP -->
<div id="map"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="app-title">
    <h1>おもいでマップ</h1>
    <p>タップして思い出を残す</p>
  </div>
  <div class="login-card">
    <div class="login-status" id="loginStatus">未ログイン</div>
    <button class="btn-google" id="loginBtn" disabled>Googleログイン</button>
    <button class="btn-logout" id="logoutBtn" style="display:none">ログアウト</button>
  </div>
</div>

<!-- MODE HINT -->
<div class="mode-hint" id="modeHint">地図をタップして思い出を追加</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-inner">
    <button class="nav-btn active" id="navAdd" onclick="switchMode('add')">
      <span class="icon">📍</span>
      <span class="label">追加</span>
    </button>
    <button class="nav-btn" id="navView" onclick="switchMode('view')">
      <span class="icon">🗺️</span>
      <span class="label">閲覧</span>
    </button>
    <button class="nav-btn" id="navDelete" onclick="switchMode('delete')">
      <span class="icon">🗑️</span>
      <span class="label">削除</span>
    </button>
  </div>
</div>

<!-- SHEET OVERLAY -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>

<!-- BOTTOM SHEET (Add Form) -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">📍 思い出を記録</div>

  <div class="form-group">
    <label class="form-label">日付</label>
    <input type="date" class="form-input" id="dateInput" />
  </div>

  <div class="form-group">
    <label class="form-label">写真</label>
    <div class="photo-picker" id="photoPicker" onclick="document.getElementById('photoInput').click()">
      <span class="picker-icon">📷</span>
      <span class="picker-text" id="pickerText">タップして選択</span>
    </div>
    <img class="photo-preview" id="photoPreview" />
    <input type="file" id="photoInput" accept="image/*" style="display:none" />
  </div>

  <div class="form-group">
    <label class="form-label">コメント（144字）</label>
    <textarea class="form-input" id="commentInput" maxlength="144" placeholder="どんな思い出ですか？"></textarea>
  </div>

  <button class="btn-save" onclick="saveMarker()">この場所に保存する</button>
  <button class="btn-cancel" onclick="closeSheet()">キャンセル</button>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">処理中...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
<script src="https://apis.google.com/js/api.js" async defer onload="gapiLoaded()"></script>

<script>
  // ─── CONFIG ───
  const CLIENT_ID = '310342423148-drn26o028gsid10deu4krdgb0qhup6f9.apps.googleusercontent.com'; // ← GCPで取得したIDに差し替え
  const SCOPE = 'https://www.googleapis.com/auth/drive.file';
  const DATA_FILENAME = 'memory_map_data.json';
  const PHOTOS_FOLDER = 'MemoryMapPhotos';

  // ─── STATE ───
  let accessToken = null;
  let tokenClient = null;
  let gapiReady = false, gisReady = false;
  let currentMode = 'add';
  let tempMarker = null;
  let tempPhotoBlob = null;
  let dataFileId = null;
  let photosFolderId = null;
  let memories = [];

  // ─── MAP ───
  const map = L.map('map', { zoomControl: false }).setView([35.6895, 139.6917], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  const markerLayer = L.layerGroup().addTo(map);

  // Try geolocation
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      map.setView([pos.coords.latitude, pos.coords.longitude], 15);
    });
  }

  map.on('click', e => {
    if (currentMode !== 'add' || !accessToken) return;
    if (tempMarker) map.removeLayer(tempMarker);
    tempMarker = L.marker(e.latlng).addTo(map);
    openSheet();
  });

  // ─── GAPI / GIS ───
  function gapiLoaded() {
    gapi.load('client', async () => {
      await gapi.client.init({});
      await gapi.client.load('drive', 'v3');
      gapiReady = true;
      maybeEnableLogin();
    });
  }

  function gisLoaded() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPE,
      callback: async resp => {
        if (resp.error) return;
        accessToken = resp.access_token;
        gapi.client.setToken({ access_token: accessToken });
        updateLoginUI(true);
        await loadMemories();
      }
    });
    gisReady = true;
    maybeEnableLogin();
  }

  function maybeEnableLogin() {
    if (gapiReady && gisReady) document.getElementById('loginBtn').disabled = false;
  }

  document.getElementById('loginBtn').onclick = () => {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  };

  document.getElementById('logoutBtn').onclick = () => {
    if (!accessToken) return;
    google.accounts.oauth2.revoke(accessToken, () => {
      accessToken = null;
      memories = [];
      dataFileId = null;
      photosFolderId = null;
      markerLayer.clearLayers();
      updateLoginUI(false);
    });
  };

  function updateLoginUI(loggedIn) {
    const status = document.getElementById('loginStatus');
    status.textContent = loggedIn ? 'ログイン済み ✓' : '未ログイン';
    status.className = 'login-status' + (loggedIn ? ' logged-in' : '');
    document.getElementById('loginBtn').style.display = loggedIn ? 'none' : 'block';
    document.getElementById('logoutBtn').style.display = loggedIn ? 'block' : 'none';
  }

  // ─── MODE ───
  const hints = {
    add: '地図をタップして思い出を追加',
    view: 'マーカーをタップして表示',
    delete: 'マーカーをタップして削除'
  };

  function switchMode(mode) {
    currentMode = mode;
    ['add', 'view', 'delete'].forEach(m => {
      document.getElementById('nav' + m[0].toUpperCase() + m.slice(1)).classList.toggle('active', m === mode);
    });
    closeSheet();

    const hint = document.getElementById('modeHint');
    hint.textContent = hints[mode];
    hint.classList.add('visible');
    setTimeout(() => hint.classList.remove('visible'), 2200);

    renderMarkers();
  }

  // ─── SHEET ───
  function openSheet() {
    document.getElementById('dateInput').valueAsDate = new Date();
    document.getElementById('commentInput').value = '';
    document.getElementById('photoInput').value = '';
    document.getElementById('photoPicker').className = 'photo-picker';
    document.getElementById('pickerText').textContent = 'タップして選択';
    document.getElementById('photoPreview').style.display = 'none';
    tempPhotoBlob = null;

    document.getElementById('sheetOverlay').classList.add('open');
    document.getElementById('sheet').classList.add('open');
  }

  function closeSheet() {
    document.getElementById('sheetOverlay').classList.remove('open');
    document.getElementById('sheet').classList.remove('open');
    if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
    tempPhotoBlob = null;
  }

  // ─── PHOTO INPUT ───
  document.getElementById('photoInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 900;
        let w = img.width, h = img.height;
        if (w > h && w > max) { h = h * max / w; w = max; }
        else if (h > max) { w = w * max / h; h = max; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => {
          tempPhotoBlob = blob;
          // show preview
          const url = URL.createObjectURL(blob);
          const preview = document.getElementById('photoPreview');
          preview.src = url;
          preview.style.display = 'block';
          document.getElementById('photoPicker').style.display = 'none';
        }, 'image/jpeg', 0.75);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  // ─── LOADING ───
  function setLoading(on, text = '処理中...') {
    document.getElementById('loadingText').textContent = text;
    document.getElementById('loadingOverlay').classList.toggle('visible', on);
  }

  // ─── DRIVE HELPERS ───
  async function ensureFolder() {
    if (photosFolderId) return photosFolderId;
    const res = await gapi.client.drive.files.list({
      q: `name='${PHOTOS_FOLDER}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
      fields: 'files(id)'
    });
    if (res.result.files.length > 0) {
      photosFolderId = res.result.files[0].id;
    } else {
      const created = await gapi.client.drive.files.create({
        resource: { name: PHOTOS_FOLDER, mimeType: 'application/vnd.google-apps.folder' },
        fields: 'id'
      });
      photosFolderId = created.result.id;
    }
    return photosFolderId;
  }

  async function loadDataFile() {
    if (dataFileId) return;
    const res = await gapi.client.drive.files.list({
      q: `name='${DATA_FILENAME}' and trashed=false`,
      fields: 'files(id)'
    });
    if (res.result.files.length > 0) {
      dataFileId = res.result.files[0].id;
      // fetch content
      const content = await fetch(`https://www.googleapis.com/drive/v3/files/${dataFileId}?alt=media`, {
        headers: { Authorization: 'Bearer ' + accessToken }
      });
      memories = await content.json();
    } else {
      memories = [];
    }
  }

  async function saveDataFile() {
    const json = JSON.stringify(memories);
    if (!dataFileId) {
      // create
      const meta = { name: DATA_FILENAME, mimeType: 'application/json' };
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
      form.append('file', new Blob([json], { type: 'application/json' }));
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + accessToken },
        body: form
      });
      const data = await res.json();
      dataFileId = data.id;
    } else {
      // update
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${dataFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: {
          Authorization: 'Bearer ' + accessToken,
          'Content-Type': 'application/json'
        },
        body: json
      });
    }
  }

  async function uploadPhoto(blob, id) {
    const folderId = await ensureFolder();
    const meta = { name: id + '.jpg', parents: [folderId] };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
    form.append('file', blob);
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + accessToken },
      body: form
    });
    const data = await res.json();
    // make public
    await gapi.client.drive.permissions.create({
      fileId: data.id,
      resource: { role: 'reader', type: 'anyone' }
    });
    return data.id;
  }

  function photoUrl(fileId) {
    return `https://lh3.googleusercontent.com/d/${fileId}=s1000`;
  }

  // ─── SAVE MARKER ───
  async function saveMarker() {
    if (!accessToken || !tempMarker) return;
    setLoading(true, '保存中...');
    try {
      await loadDataFile();

      const id = String(Date.now());
      let photoFileId = null;

      if (tempPhotoBlob) {
        setLoading(true, '写真をアップロード中...');
        photoFileId = await uploadPhoto(tempPhotoBlob, id);
      }

      const memory = {
        id,
        lat: tempMarker.getLatLng().lat,
        lng: tempMarker.getLatLng().lng,
        date: document.getElementById('dateInput').value,
        comment: document.getElementById('commentInput').value,
        photoFileId: photoFileId || '',
        createdAt: new Date().toISOString()
      };

      memories.push(memory);
      setLoading(true, 'データを保存中...');
      await saveDataFile();

      closeSheet();
      renderMarkers();
    } catch (e) {
      console.error(e);
      alert('保存に失敗しました: ' + e.message);
    } finally {
      setLoading(false);
    }
  }

  // ─── LOAD MEMORIES ───
  async function loadMemories() {
    if (!accessToken) return;
    setLoading(true, '読み込み中...');
    try {
      await loadDataFile();
      renderMarkers();
    } catch (e) {
      console.error(e);
    } finally {
      setLoading(false);
    }
  }

  // ─── RENDER MARKERS ───
  function renderMarkers() {
    markerLayer.clearLayers();
    if (currentMode === 'add') return;

    memories.forEach(m => {
      const marker = L.marker([m.lat, m.lng]).addTo(markerLayer);

      let html = `<div class="popup-wrap">`;
      if (m.photoFileId) {
        html += `<img class="popup-img" src="${photoUrl(m.photoFileId)}" loading="lazy">`;
      }
      html += `<div class="popup-body">`;
      html += `<div class="popup-date">${m.date || ''}</div>`;
      html += `<div class="popup-comment">${m.comment || ''}</div>`;
      html += `</div>`;
      if (currentMode === 'delete') {
        html += `<button class="popup-delete" onclick="deleteMemory('${m.id}')">🗑 この思い出を削除</button>`;
      }
      html += `</div>`;

      marker.bindPopup(html, { maxWidth: 280 });
    });
  }

  // ─── DELETE ───
  window.deleteMemory = async (id) => {
    if (!confirm('この思い出を削除しますか？')) return;
    setLoading(true, '削除中...');
    try {
      const idx = memories.findIndex(m => m.id === id);
      if (idx === -1) return;
      const mem = memories[idx];

      // delete photo from drive
      if (mem.photoFileId) {
        try {
          await gapi.client.drive.files.delete({ fileId: mem.photoFileId });
        } catch (e) {
          console.warn('写真削除失敗', e);
        }
      }

      memories.splice(idx, 1);
      await saveDataFile();
      renderMarkers();
    } catch (e) {
      console.error(e);
      alert('削除に失敗しました: ' + e.message);
    } finally {
      setLoading(false);
    }
  };

  // ─── INIT HINT ───
  setTimeout(() => {
    const hint = document.getElementById('modeHint');
    hint.textContent = hints['add'];
    hint.classList.add('visible');
    setTimeout(() => hint.classList.remove('visible'), 2500);
  }, 800);
</script>
</body>
</html>
