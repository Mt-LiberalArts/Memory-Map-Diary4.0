<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PHOTOMAPIOMENTS</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 地図 -->
<div id="map"></div>

<!-- ローディング -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">処理中...</div>
</div>

<!-- ヘッダー -->
<div class="header">
  <div class="logo-card">
    <h1>PHOTOMAPIOMENTS</h1>
    <p>Tap to capture your moments</p>
  </div>
  <div class="auth-card">
    <div class="login-status" id="loginStatus">Not signed in</div>
    <button class="btn btn-primary" id="loginBtn" disabled>Sign in with Google</button>
    <button class="btn btn-ghost" id="logoutBtn" style="display:none">Sign out</button>
  </div>
</div>

<!-- トースト通知 -->
<div class="toast" id="toast"></div>

<!-- Mode hint -->
<div class="mode-hint" id="modeHint">Tap the map to add a memory</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <div class="nav-inner">
    <button class="nav-btn active" id="navAdd"    onclick="switchMode('add')">
      <span class="icon">📍</span><span class="label">Add</span>
    </button>
    <button class="nav-btn"        id="navView"   onclick="switchMode('view')">
      <span class="icon">🗺️</span><span class="label">View</span>
    </button>
    <button class="nav-btn"        id="navDelete" onclick="switchMode('delete')">
      <span class="icon">✏️</span><span class="label">Edit</span>
    </button>
  </div>
</div>

<!-- シートオーバーレイ -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>

<!-- 入力フォーム（ボトムシート） -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">📍 Record a Memory</div>

  <div class="form-group">
    <label class="form-label">Photo</label>
    <div class="photo-picker" id="photoPicker" onclick="document.getElementById('photoInput').click()">
      <span class="picker-icon">📷</span>
      <span class="picker-text" id="pickerText">Tap to select</span>
    </div>
    <img class="photo-preview" id="photoPreview" onclick="document.getElementById('photoInput').click()" style="cursor:pointer" />
    <input type="file" id="photoInput" accept="image/*" style="display:none" />
  </div>

  <div class="form-group">
    <label class="form-label">Comment (144 chars)</label>
    <textarea class="form-input" id="commentInput" maxlength="144" placeholder="What's the memory?"></textarea>
  </div>

  <div class="form-group">
    <label class="form-label">Date</label>
    <input type="date" class="form-input" id="dateInput" />
  </div>

  <button class="btn-save" onclick="saveMarker()">Save to this location</button>
  <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
</div>

<!-- ─────────────────────────────────────
     外部ライブラリ
───────────────────────────────────── -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ─────────────────────────────────────
     アプリモジュール（依存順に読み込む）
     1. config.js   → 定数・STATE の定義
     2. ui.js       → showToast / setLoading / handleDriveError
     3. map.js      → Leaflet初期化・renderMarkers・switchMode
     4. sheet.js    → openSheet / closeSheet
     5. photo.js    → EXIF・リサイズ・プレビュー
     6. drive.js    → Drive CRUD
     7. memories.js → saveMarker / loadMemories / editMemory / deleteMemory
     8. auth.js     → Google認証（loadMemories を呼ぶため最後）
───────────────────────────────────── -->
<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/map.js"></script>
<script src="js/sheet.js"></script>
<script src="js/photo.js"></script>
<script src="js/drive.js"></script>
<script src="js/memories.js"></script>
<script src="js/auth.js"></script>

<!-- Google Identity / GAPI（非同期・コールバック経由で初期化）-->
<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
<script src="https://apis.google.com/js/api.js"      async defer onload="gapiLoaded()"></script>

</body>
</html>
