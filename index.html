<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>おもいでマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

  <!-- ═══════════════════════════════════════════
       § CSS
       ─ デザイントークン（色・角丸）
       ─ レイアウト（地図・ヘッダー・ナビ・シート）
       ─ コンポーネント（ボタン・フォーム・ポップアップ）
       ─ ユーティリティ（ローディング・ヒント・Leaflet上書き）
  ═══════════════════════════════════════════ -->
  <style>

    /* ── デザイントークン ── */
    :root {
      --bg:      #faf7f2;
      --ink:     #1a1a2e;
      --warm:    #e8ddd0;
      --accent:  #c9614a;
      --blue:    #4a8fa8;
      --green:   #5a8a6a;
      --shadow:  rgba(26, 26, 46, 0.12);
      --radius:  20px;
    }

    /* ── リセット ── */
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Zen Maru Gothic', sans-serif;
    }
    body {
      height: 100dvh;
      background: var(--ink);
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    /* ── 地図 ── */
    #map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    /* ── ヘッダー（ロゴ＋ログインボタン） ── */
    .header {
      position: absolute;
      top: 10px; left: 10px; right: 10px;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
    }

    .logo-card {
      background: var(--bg);
      padding: 10px 18px;
      border-radius: var(--radius);
      box-shadow: 0 2px 12px var(--shadow);
      pointer-events: auto;
    }
    .logo-card h1 {
      font-size: 17px;
      color: var(--ink);
      letter-spacing: 0.02em;
    }
    .logo-card p {
      font-size: 10px;
      color: #aaa;
      margin-top: 2px;
    }

    .auth-card {
      background: var(--bg);
      padding: 10px 14px;
      border-radius: var(--radius);
      box-shadow: 0 2px 12px var(--shadow);
      text-align: right;
      pointer-events: auto;
    }
    .login-status {
      font-size: 11px;
      font-weight: 700;
      color: #aaa;
      margin-bottom: 6px;
    }
    .login-status.logged-in { color: var(--green); }

    /* ── ボタン共通 ── */
    .btn {
      border: none;
      border-radius: 30px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: var(--accent);
      color: white;
      padding: 9px 18px;
      font-size: 13px;
      box-shadow: 0 3px 12px rgba(201, 97, 74, 0.35);
    }
    .btn-primary:disabled { background: #ccc; box-shadow: none; cursor: default; }

    .btn-ghost {
      background: none;
      border: 1px solid #ccc;
      color: #888;
      padding: 6px 12px;
      font-size: 12px;
    }

    /* ── モードヒント（画面下部のトースト） ── */
    .mode-hint {
      position: absolute;
      bottom: 100px; left: 50%;
      transform: translateX(-50%);
      z-index: 99;
      background: rgba(26, 26, 46, 0.82);
      color: var(--bg);
      font-size: 12px;
      padding: 8px 20px;
      border-radius: 30px;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 16px var(--shadow);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .mode-hint.visible { opacity: 1; }

    /* ── ボトムナビ（追加 / 閲覧 / 削除） ── */
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0 16px env(safe-area-inset-bottom, 16px);
      pointer-events: none;
    }
    .nav-inner {
      background: var(--bg);
      border-radius: 24px 24px 0 0;
      padding: 12px 8px 4px;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 -4px 30px var(--shadow);
      pointer-events: auto;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      padding: 8px 4px;
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Zen Maru Gothic', sans-serif;
    }
    .nav-btn .icon  { font-size: 22px; line-height: 1; }
    .nav-btn .label { font-size: 10px; color: #aaa; font-weight: 700; transition: color 0.2s; }
    .nav-btn.active            { background: var(--warm); }
    .nav-btn.active .label     { color: var(--ink); }

    /* ── シート（思い出入力フォーム） ── */
    .sheet-overlay {
      position: absolute; inset: 0;
      background: rgba(26, 26, 46, 0.45);
      z-index: 200;
      display: none;
      backdrop-filter: blur(2px);
    }
    .sheet-overlay.open { display: block; }

    .sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--bg);
      border-radius: 28px 28px 0 0;
      padding: 0 20px calc(env(safe-area-inset-bottom, 20px) + 20px);
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 90dvh;
      overflow-y: auto;
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 40px; height: 4px;
      background: #ddd; border-radius: 2px;
      margin: 12px auto 20px;
    }
    .sheet-title {
      font-size: 17px; font-weight: 700; color: var(--ink);
      margin-bottom: 20px;
    }

    /* ── フォームパーツ ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 11px; font-weight: 700;
      color: #aaa; margin-bottom: 6px;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: white;
      border: 1.5px solid var(--warm);
      border-radius: 14px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 16px; color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--blue); }
    textarea.form-input { resize: none; height: 100px; line-height: 1.6; }

    /* 写真ピッカー */
    .photo-picker {
      width: 100%; height: 110px;
      background: white;
      border: 2px dashed var(--warm);
      border-radius: 14px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .photo-picker:active          { background: var(--warm); }
    .photo-picker.has-photo       { border-style: solid; border-color: var(--green); background: #f0f7f2; }
    .photo-picker .picker-icon    { font-size: 28px; }
    .photo-picker .picker-text    { font-size: 12px; color: #aaa; font-weight: 700; }
    .photo-picker.has-photo .picker-text { color: var(--green); }

    .photo-preview {
      width: 100%; height: 160px;
      object-fit: cover; border-radius: 14px;
      display: none;
    }

    /* 保存・キャンセルボタン */
    .btn-save {
      width: 100%; padding: 16px;
      background: var(--accent); color: white;
      border: none; border-radius: var(--radius);
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      box-shadow: 0 4px 16px rgba(201, 97, 74, 0.35);
      transition: transform 0.15s;
    }
    .btn-save:active { transform: scale(0.98); }

    .btn-cancel {
      width: 100%; padding: 14px;
      background: none; color: #aaa; border: none;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 15px; cursor: pointer; margin-top: 4px;
    }

    /* ── ポップアップ（思い出表示） ── */
    .leaflet-popup-content-wrapper {
      border-radius: var(--radius) !important;
      box-shadow: 0 8px 32px var(--shadow) !important;
      padding: 0 !important; overflow: hidden;
      background: var(--bg) !important;
    }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }
    .leaflet-popup-tip     { background: var(--bg) !important; }

    .popup-wrap    { min-width: 200px; max-width: 260px; }
    .popup-img     { width: 100%; height: 140px; object-fit: cover; display: block; }
    .popup-body    { padding: 14px 16px; }
    .popup-date    { font-size: 11px; color: #aaa; font-weight: 700; margin-bottom: 4px; }
    .popup-comment { font-size: 14px; color: var(--ink); line-height: 1.6; }
    .popup-delete  {
      display: block;
      width: calc(100% - 32px); margin: 0 16px 14px;
      padding: 10px;
      background: #fff0ee; color: var(--accent);
      border: 1.5px solid #ffd5cc; border-radius: 12px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 13px; font-weight: 700;
      cursor: pointer; text-align: center;
    }

    /* ── ローディングオーバーレイ ── */
    .loading-overlay {
      position: absolute; inset: 0;
      background: rgba(250, 247, 242, 0.85);
      z-index: 999;
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; backdrop-filter: blur(4px);
    }
    .loading-overlay.visible { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--warm);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; font-weight: 700; color: var(--ink); }

    /* ── トースト通知 ── */
    .toast {
      position: absolute;
      top: 80px; left: 50%;
      transform: translateX(-50%);
      z-index: 998;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 13px; font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 4px 16px var(--shadow);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.visible  { opacity: 1; }
    .toast.error    { background: var(--accent); color: white; }
    .toast.info     { background: var(--ink); color: var(--bg); }
    .toast.relogin  { background: #fff0ee; color: var(--accent);
                      border: 1.5px solid #ffd5cc; pointer-events: auto; cursor: pointer; }

    /* ── Leaflet上書き ── */
    .leaflet-control-zoom   { display: none !important; }
    .leaflet-marker-icon    { filter: drop-shadow(0 3px 6px rgba(0,0,0,0.25)); }

  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     § HTML
     ─ 地図コンテナ
     ─ ヘッダー（ロゴ・認証）
     ─ モードヒント
     ─ ボトムナビ（追加 / 閲覧 / 削除）
     ─ シートオーバーレイ＋入力フォーム
     ─ ローディング表示
     ─ 外部スクリプト読み込み
═══════════════════════════════════════════ -->

<!-- 地図 -->
<div id="map"></div>

<!-- ローディング -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">処理中...</div>
</div>

<!-- ヘッダー -->
<div class="header">
  <div class="logo-card">
    <h1>おもいでマップ</h1>
    <p>タップして思い出を残す</p>
  </div>
  <div class="auth-card">
    <div class="login-status" id="loginStatus">未ログイン</div>
    <button class="btn btn-primary" id="loginBtn" disabled>Googleログイン</button>
    <button class="btn btn-ghost" id="logoutBtn" style="display:none">ログアウト</button>
  </div>
</div>

<!-- トースト通知 -->
<div class="toast" id="toast"></div>

<!-- モードヒント -->
<div class="mode-hint" id="modeHint">地図をタップして思い出を追加</div>

<!-- ボトムナビ -->
<div class="bottom-nav">
  <div class="nav-inner">
    <button class="nav-btn active" id="navAdd"    onclick="switchMode('add')">
      <span class="icon">📍</span><span class="label">追加</span>
    </button>
    <button class="nav-btn"        id="navView"   onclick="switchMode('view')">
      <span class="icon">🗺️</span><span class="label">閲覧</span>
    </button>
    <button class="nav-btn"        id="navDelete" onclick="switchMode('delete')">
      <span class="icon">🗑️</span><span class="label">削除</span>
    </button>
  </div>
</div>

<!-- シートオーバーレイ -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>

<!-- 入力フォーム（ボトムシート） -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">📍 思い出を記録</div>

  <div class="form-group">
    <label class="form-label">日付</label>
    <input type="date" class="form-input" id="dateInput" />
  </div>

  <div class="form-group">
    <label class="form-label">写真</label>
    <div class="photo-picker" id="photoPicker" onclick="document.getElementById('photoInput').click()">
      <span class="picker-icon">📷</span>
      <span class="picker-text" id="pickerText">タップして選択</span>
    </div>
    <img class="photo-preview" id="photoPreview" />
    <input type="file" id="photoInput" accept="image/*" style="display:none" />
  </div>

  <div class="form-group">
    <label class="form-label">コメント（144字）</label>
    <textarea class="form-input" id="commentInput" maxlength="144" placeholder="どんな思い出ですか？"></textarea>
  </div>

  <button class="btn-save" onclick="saveMarker()">この場所に保存する</button>
  <button class="btn-cancel" onclick="closeSheet()">キャンセル</button>
</div>

<!-- 外部ライブラリ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
<script src="https://apis.google.com/js/api.js" async defer onload="gapiLoaded()"></script>

<script>
/* ═══════════════════════════════════════════
   § JS ─ 設定・状態管理
   ─ CLIENT_ID : Google OAuthクライアントID
   ─ SCOPE     : drive.file（自分で作ったファイルのみ）
   ─ 各種状態変数（認証・モード・マーカー等）
═══════════════════════════════════════════ */
const CLIENT_ID     = '258493345784-tecrt34v0mqpq8rkmoajjhgi9lpvmfp5.apps.googleusercontent.com';
const SCOPE         = 'https://www.googleapis.com/auth/drive.file';
const DATA_FILENAME = 'memory_map_data.json';
const PHOTOS_FOLDER = 'MemoryMapPhotos';

let accessToken    = null;
let tokenClient    = null;
let gapiReady      = false;
let gisReady       = false;
let currentMode    = 'add';
let tempMarker     = null;
let tempPhotoBlob  = null;
let dataFileId     = null;
let photosFolderId = null;
let memories       = [];

/* ═══════════════════════════════════════════
   § JS ─ オンライン／オフライン監視
   ─ アプリ起動時から常時監視
   ─ 切断時・復帰時にトーストで通知
═══════════════════════════════════════════ */
window.addEventListener('offline', () => {
  showToast('オフラインです。接続を確認してください', 'error', 5000);
});
window.addEventListener('online', () => {
  showToast('接続が回復しました ✓', 'info', 2000);
});

/* ═══════════════════════════════════════════
   § JS ─ 地図初期化
   ─ Leafletで地図を表示
   ─ 現在地を取得して中心にセット
   ─ タップ時に追加モードならシートを開く
═══════════════════════════════════════════ */
const map = L.map('map', { zoomControl: false }).setView([40.7128, -74.0060], 15); // NYC default
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

const markerLayer = L.layerGroup().addTo(map);

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 15);
  });
}

map.on('click', e => {
  if (currentMode !== 'add' || !accessToken) return;
  if (tempMarker) map.removeLayer(tempMarker);
  tempMarker = L.marker(e.latlng).addTo(map);
  openSheet();
});

/* ═══════════════════════════════════════════
   § JS ─ Google認証（GAPI / GIS）
   ─ gapiLoaded : Drive APIクライアントを初期化
   ─ gisLoaded  : OAuthトークンクライアントを初期化
   ─ ログイン成功後にデータを読み込む
═══════════════════════════════════════════ */
function gapiLoaded() {
  gapi.load('client', async () => {
    await gapi.client.init({});
    await gapi.client.load('drive', 'v3');
    gapiReady = true;
    maybeEnableLogin();
  });
}

function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: async resp => {
      if (resp.error) return;
      accessToken = resp.access_token;
      gapi.client.setToken({ access_token: accessToken });
      updateLoginUI(true);
      scheduleTokenRefresh(); // ← サイレントリフレッシュを予約
      await loadMemories();
    }
  });
  gisReady = true;
  maybeEnableLogin();
}

function maybeEnableLogin() {
  if (gapiReady && gisReady) document.getElementById('loginBtn').disabled = false;
}

document.getElementById('loginBtn').onclick = () => {
  tokenClient.requestAccessToken({ prompt: 'consent' });
};

/* ─ サイレントリフレッシュ：55分ごとにトークンを自動更新 ─ */
function scheduleTokenRefresh() {
  setTimeout(() => {
    tokenClient.requestAccessToken({ prompt: '' }); // promptなし＝画面を出さずに更新
  }, 55 * 60 * 1000); // 55分
}

/* ─ トースト通知 ─
   type: 'info' | 'error' | 'relogin'
   reloginの場合はタップで再ログイン発動
─ */
let toastTimer = null;
function showToast(message, type = 'info', duration = 3000) {
  const el = document.getElementById('toast');
  el.textContent = message;
  el.className = `toast ${type} visible`;
  if (toastTimer) clearTimeout(toastTimer);
  if (type === 'relogin') {
    el.onclick = () => {
      tokenClient.requestAccessToken({ prompt: 'consent' });
      el.classList.remove('visible');
    };
  } else {
    el.onclick = null;
    toastTimer = setTimeout(() => el.classList.remove('visible'), duration);
  }
}

/* ─ Drive操作のエラーを判定して適切なメッセージを出す ─ */
function handleDriveError(e) {
  const status = e?.status || e?.result?.error?.code;
  if (status === 401) {
    accessToken = null;
    updateLoginUI(false);
    showToast('セッションが切れました。タップして再ログイン', 'relogin', 0);
  } else if (status === 404) {
    showToast('ファイルが見つかりません（Driveで削除された可能性があります）', 'error');
  } else {
    showToast('エラーが発生しました: ' + (e?.message || status), 'error');
  }
}

document.getElementById('logoutBtn').onclick = () => {
  if (!accessToken) return;
  google.accounts.oauth2.revoke(accessToken, () => {
    accessToken = null;
    memories = [];
    dataFileId = null;
    photosFolderId = null;
    markerLayer.clearLayers();
    updateLoginUI(false);
  });
};

function updateLoginUI(loggedIn) {
  const status = document.getElementById('loginStatus');
  status.textContent = loggedIn ? 'ログイン済み ✓' : '未ログイン';
  status.className = 'login-status' + (loggedIn ? ' logged-in' : '');
  document.getElementById('loginBtn').style.display  = loggedIn ? 'none'  : 'block';
  document.getElementById('logoutBtn').style.display = loggedIn ? 'block' : 'none';
}

/* ═══════════════════════════════════════════
   § JS ─ モード切り替え
   ─ add    : 地図タップで記録
   ─ view   : マーカータップで表示
   ─ delete : マーカータップで削除
═══════════════════════════════════════════ */
const hints = {
  add:    '地図をタップして思い出を追加',
  view:   'マーカーをタップして表示',
  delete: 'マーカーをタップして削除'
};

function switchMode(mode) {
  currentMode = mode;
  ['add', 'view', 'delete'].forEach(m => {
    document.getElementById('nav' + m[0].toUpperCase() + m.slice(1))
      .classList.toggle('active', m === mode);
  });
  closeSheet();

  const hint = document.getElementById('modeHint');
  hint.textContent = hints[mode];
  hint.classList.add('visible');
  setTimeout(() => hint.classList.remove('visible'), 2200);

  renderMarkers();
}

/* ═══════════════════════════════════════════
   § JS ─ シート（入力フォーム）開閉
   ─ openSheet  : 日付を今日にリセットして開く
   ─ closeSheet : シートを閉じて仮マーカーを除去
═══════════════════════════════════════════ */
function openSheet() {
  document.getElementById('dateInput').valueAsDate = new Date();
  document.getElementById('commentInput').value    = '';
  document.getElementById('photoInput').value      = '';
  document.getElementById('photoPicker').className = 'photo-picker';
  document.getElementById('pickerText').textContent = 'タップして選択';
  document.getElementById('photoPreview').style.display = 'none';
  tempPhotoBlob = null;

  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
  tempPhotoBlob = null;
  // 写真プレビューをリセット
  const preview = document.getElementById('photoPreview');
  preview.src = '';
  preview.style.display = 'none';
  document.getElementById('photoPicker').style.display = '';
  document.getElementById('photoInput').value = '';
}

/* ═══════════════════════════════════════════
   § JS ─ 写真処理
   ─ 選択した画像を最大900pxにリサイズして
     JPEG（品質75%）に変換・プレビュー表示
═══════════════════════════════════════════ */
document.getElementById('photoInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 900;
      let w = img.width, h = img.height;
      if (w > h && w > max) { h = h * max / w; w = max; }
      else if (h > max)     { w = w * max / h; h = max; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        tempPhotoBlob = blob;
        const url = URL.createObjectURL(blob);
        const preview = document.getElementById('photoPreview');
        preview.src = url;
        preview.style.display = 'block';
        document.getElementById('photoPicker').style.display = 'none';
      }, 'image/jpeg', 0.75);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

/* ═══════════════════════════════════════════
   § JS ─ ローディング表示
   ─ setLoading(true/false, テキスト) で制御
═══════════════════════════════════════════ */
function setLoading(on, text = '処理中...') {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingOverlay').classList.toggle('visible', on);
}

/* ═══════════════════════════════════════════
   § JS ─ Google Drive操作
   ─ ensureFolder  : 写真保存フォルダを取得 or 作成
   ─ loadDataFile  : JSONデータファイルを読み込む
   ─ saveDataFile  : JSONデータファイルを保存 or 更新
   ─ uploadPhoto   : 写真をDriveにアップロード
   ─ photoUrl      : ファイルIDから表示用URLを生成
═══════════════════════════════════════════ */
async function ensureFolder() {
  if (photosFolderId) return photosFolderId;
  const res = await gapi.client.drive.files.list({
    q: `name='${PHOTOS_FOLDER}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
    fields: 'files(id)'
  });
  if (res.result.files.length > 0) {
    photosFolderId = res.result.files[0].id;
  } else {
    const created = await gapi.client.drive.files.create({
      resource: { name: PHOTOS_FOLDER, mimeType: 'application/vnd.google-apps.folder' },
      fields: 'id'
    });
    photosFolderId = created.result.id;
  }
  return photosFolderId;
}

async function loadDataFile() {
  if (dataFileId) return;
  const res = await gapi.client.drive.files.list({
    q: `name='${DATA_FILENAME}' and trashed=false`,
    fields: 'files(id)'
  });
  if (res.result.files.length > 0) {
    dataFileId = res.result.files[0].id;
    const content = await fetch(
      `https://www.googleapis.com/drive/v3/files/${dataFileId}?alt=media`,
      { headers: { Authorization: 'Bearer ' + accessToken } }
    );
    memories = await content.json();
  } else {
    memories = [];
  }
}

async function saveDataFile() {
  const json = JSON.stringify(memories);
  if (!dataFileId) {
    const meta = { name: DATA_FILENAME, mimeType: 'application/json' };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
    form.append('file',     new Blob([json],                 { type: 'application/json' }));
    const res = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
      { method: 'POST', headers: { Authorization: 'Bearer ' + accessToken }, body: form }
    );
    const data = await res.json();
    dataFileId = data.id;
  } else {
    await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${dataFileId}?uploadType=media`,
      {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
        body: json
      }
    );
  }
}

async function uploadPhoto(blob, id) {
  const folderId = await ensureFolder();
  const meta = { name: id + '.jpg', parents: [folderId] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
  form.append('file', blob);
  const res = await fetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
    { method: 'POST', headers: { Authorization: 'Bearer ' + accessToken }, body: form }
  );
  const data = await res.json();
  await gapi.client.drive.permissions.create({
    fileId: data.id,
    resource: { role: 'reader', type: 'anyone' }
  });
  return data.id;
}

function photoUrl(fileId) {
  return `https://lh3.googleusercontent.com/d/${fileId}=s1000`;
}

/* ═══════════════════════════════════════════
   § JS ─ 思い出の保存
   ─ 1. 写真があればDriveにアップロード
   ─ 2. 緯度経度・日付・コメントをJSONに追加
   ─ 3. DriveのJSONファイルを更新
   ─ 4. マーカーを再描画
═══════════════════════════════════════════ */
async function saveMarker() {
  if (!accessToken || !tempMarker) return;
  setLoading(true, '保存中...');
  try {
    await loadDataFile();

    const id = String(Date.now());
    let photoFileId = null;

    if (tempPhotoBlob) {
      setLoading(true, '写真をアップロード中...');
      photoFileId = await uploadPhoto(tempPhotoBlob, id);
    }

    memories.push({
      id,
      lat:         tempMarker.getLatLng().lat,
      lng:         tempMarker.getLatLng().lng,
      date:        document.getElementById('dateInput').value,
      comment:     document.getElementById('commentInput').value,
      photoFileId: photoFileId || '',
      createdAt:   new Date().toISOString()
    });

    setLoading(true, 'データを保存中...');
    await saveDataFile();
    closeSheet();
    renderMarkers();
  } catch (e) {
    console.error(e);
    handleDriveError(e);
  } finally {
    setLoading(false);
  }
}

/* ═══════════════════════════════════════════
   § JS ─ 思い出の読み込み・描画
   ─ loadMemories  : ログイン後にDriveからデータを取得
   ─ renderMarkers : memoriesをもとに全マーカーを再描画
                     削除モード時は削除ボタンも表示
═══════════════════════════════════════════ */
async function loadMemories() {
  if (!accessToken) return;
  setLoading(true, '読み込み中...');
  try {
    await loadDataFile();
    renderMarkers();
  } catch (e) {
    console.error(e);
    handleDriveError(e);
  } finally {
    setLoading(false);
  }
}

function renderMarkers() {
  markerLayer.clearLayers();
  if (currentMode === 'add') return;

  memories.forEach(m => {
    const marker = L.marker([m.lat, m.lng]).addTo(markerLayer);

    let html = `<div class="popup-wrap">`;
    if (m.photoFileId) {
      html += `<img class="popup-img" src="${photoUrl(m.photoFileId)}" loading="lazy" onerror="this.style.display='none'">`;
    }
    html += `<div class="popup-body">
               <div class="popup-date">${m.date || ''}</div>
               <div class="popup-comment">${m.comment || ''}</div>
             </div>`;
    if (currentMode === 'delete') {
      html += `<button class="popup-delete" onclick="deleteMemory('${m.id}')">🗑 この思い出を削除</button>`;
    }
    html += `</div>`;

    marker.bindPopup(html, { maxWidth: 280 });
  });
}

/* ═══════════════════════════════════════════
   § JS ─ 思い出の削除
   ─ 1. 確認ダイアログ
   ─ 2. DriveからJPEG写真を削除
   ─ 3. memoriesから除去してJSONを更新
   ─ 4. マーカーを再描画
═══════════════════════════════════════════ */
window.deleteMemory = async (id) => {
  if (!confirm('この思い出を削除しますか？')) return;
  setLoading(true, '削除中...');
  try {
    const idx = memories.findIndex(m => m.id === id);
    if (idx === -1) return;
    const mem = memories[idx];

    if (mem.photoFileId) {
      try { await gapi.client.drive.files.delete({ fileId: mem.photoFileId }); }
      catch (e) { console.warn('写真削除失敗', e); }
    }

    memories.splice(idx, 1);
    await saveDataFile();
    renderMarkers();
  } catch (e) {
    console.error(e);
    handleDriveError(e);
  } finally {
    setLoading(false);
  }
};

/* ═══════════════════════════════════════════
   § JS ─ 起動時ヒント
   ─ 0.8秒後に「追加モード」のヒントを一瞬表示
═══════════════════════════════════════════ */
setTimeout(() => {
  const hint = document.getElementById('modeHint');
  hint.textContent = hints['add'];
  hint.classList.add('visible');
  setTimeout(() => hint.classList.remove('visible'), 2500);
}, 800);
</script>
