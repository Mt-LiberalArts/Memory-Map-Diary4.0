<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>おもいでマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 地図 -->
<div id="map"></div>

<!-- ローディング -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">処理中...</div>
</div>

<!-- ヘッダー -->
<div class="header">
  <div class="logo-card">
    <h1>おもいでマップ</h1>
    <p>タップして思い出を残す</p>
  </div>
  <div class="auth-card">
    <div class="login-status" id="loginStatus">未ログイン</div>
    <button class="btn btn-primary" id="loginBtn" disabled>Googleログイン</button>
    <button class="btn btn-ghost" id="logoutBtn" style="display:none">ログアウト</button>
  </div>
</div>

<!-- トースト通知 -->
<div class="toast" id="toast"></div>

<!-- モードヒント -->
<div class="mode-hint" id="modeHint">地図をタップして思い出を追加</div>

<!-- ボトムナビ -->
<div class="bottom-nav">
  <div class="nav-inner">
    <button class="nav-btn active" id="navAdd"    onclick="switchMode('add')">
      <span class="icon">📍</span><span class="label">追加</span>
    </button>
    <button class="nav-btn"        id="navView"   onclick="switchMode('view')">
      <span class="icon">🗺️</span><span class="label">閲覧</span>
    </button>
    <button class="nav-btn"        id="navDelete" onclick="switchMode('delete')">
      <span class="icon">🗑️</span><span class="label">削除</span>
    </button>
  </div>
</div>

<!-- シートオーバーレイ -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>

<!-- 入力フォーム（ボトムシート） -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">📍 思い出を記録</div>

  <div class="form-group">
    <label class="form-label">写真</label>
    <div class="photo-picker" id="photoPicker" onclick="document.getElementById('photoInput').click()">
      <span class="picker-icon">📷</span>
      <span class="picker-text" id="pickerText">タップして選択</span>
    </div>
    <img class="photo-preview" id="photoPreview" onclick="document.getElementById('photoInput').click()" style="cursor:pointer" />
    <input type="file" id="photoInput" accept="image/*" style="display:none" />
  </div>

  <div class="form-group">
    <label class="form-label">コメント（144字）</label>
    <textarea class="form-input" id="commentInput" maxlength="144" placeholder="どんな思い出ですか？"></textarea>
  </div>

  <div class="form-group">
    <label class="form-label">日付</label>
    <input type="date" class="form-input" id="dateInput" />
  </div>

  <button class="btn-save" onclick="saveMarker()">この場所に保存する</button>
  <button class="btn-cancel" onclick="closeSheet()">キャンセル</button>
</div>

<!-- 外部ライブラリ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
<script src="https://apis.google.com/js/api.js" async defer onload="gapiLoaded()"></script>

<!-- アプリロジック -->
<script src="app.js"></script>

</body>
</html>
