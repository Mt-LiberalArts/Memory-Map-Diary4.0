<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PHOTOMAPIOMENTS</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 地図 -->
<div id="map"></div>

<!-- ローディング -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">処理中...</div>
</div>

<!-- ヘッダー -->
<div class="header">
  <div class="logo-card">
    <h1>PHOTOMAPIOMENTS</h1>
    <p>Tap to capture your moments</p>
  </div>
  <div class="auth-card">
    <div class="login-status" id="loginStatus">Not signed in</div>
    <button class="btn btn-primary" id="loginBtn" disabled>Sign in with Google</button>
    <button class="btn btn-ghost"   id="logoutBtn" style="display:none">Sign out</button>
  </div>
</div>

<!-- トースト通知 -->
<div class="toast" id="toast"></div>

<!-- モードヒント -->
<div class="mode-hint" id="modeHint"></div>

<!-- ボトムナビ（onclickなし → main.jsで登録） -->
<div class="bottom-nav">
  <div class="nav-inner">
    <button class="nav-btn active" id="navAdd">
      <span class="icon">📍</span><span class="label">Add</span>
    </button>
    <button class="nav-btn" id="navView">
      <span class="icon">🗺️</span><span class="label">View</span>
    </button>
    <button class="nav-btn" id="navDelete">
      <span class="icon">✏️</span><span class="label">Edit</span>
    </button>
  </div>
</div>

<!-- シートオーバーレイ（onclickなし → main.jsで登録） -->
<div class="sheet-overlay" id="sheetOverlay"></div>

<!-- 入力フォーム -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">📍 Record a Memory</div>

  <div class="form-group">
    <label class="form-label">Photo</label>
    <!-- onclickなし → main.jsで登録 -->
    <div class="photo-picker" id="photoPicker">
      <span class="picker-icon">📷</span>
      <span class="picker-text" id="pickerText">Tap to select</span>
    </div>
    <img class="photo-preview" id="photoPreview" style="cursor:pointer" />
    <input type="file" id="photoInput" accept="image/*" style="display:none" />
  </div>

  <div class="form-group">
    <label class="form-label">Comment (144 chars)</label>
    <textarea class="form-input" id="commentInput" maxlength="144" placeholder="What's the memory?"></textarea>
  </div>

  <div class="form-group">
    <label class="form-label">Date</label>
    <input type="date" class="form-input" id="dateInput" />
  </div>

  <!-- onclickなし → main.jsで登録 -->
  <button class="btn-save">Save to this location</button>
  <button class="btn-cancel">Cancel</button>
</div>

<!-- ─────────────────────────────────────
     外部ライブラリ
───────────────────────────────────── -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ─────────────────────────────────────
     アプリ本体：これだけ！
     type="module" により import/export が使える
     → 読み込み順は自動解決
───────────────────────────────────── -->
<script type="module" src="js/main.js"></script>

<!-- Google API（コールバックはmain.jsでwindowに公開済み） -->
<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
<script src="https://apis.google.com/js/api.js"      async defer onload="gapiLoaded()"></script>

</body>
</html>
